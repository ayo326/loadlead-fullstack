# ── Security headers ─────────────────────────────────────────────────────────
#
# Security response headers (HSTS, X-Frame-Options, X-Content-Type-Options,
# Referrer-Policy, CSP, Permissions-Policy, Cross-Origin-*) are now set by the
# application itself (helmet, see src/index.ts), so they travel with the app and
# do not depend on this proxy being in place or correctly configured. Nginx no
# longer duplicates them here (a second, conflicting Strict-Transport-Security in
# particular is worth avoiding).
#
# Nginx still strips the framework banner from the proxied response as a second
# layer alongside the app's own app.disable('x-powered-by').
proxy_hide_header X-Powered-By;
