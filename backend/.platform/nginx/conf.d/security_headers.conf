# ── Security headers injected by Nginx (AL2023 EB Node.js platform) ──────────
#
# These headers are added to every response proxied from the Node.js app.
# They complement the application-layer HTTPS redirect in index.ts and
# the planned helmet middleware (I9).
#
# Included in the http {} block by EB's Nginx. The add_header directives
# apply to the proxy_pass server block managed by EB.

map $http_x_forwarded_proto $hsts_header {
    "https"  "max-age=31536000; includeSubDomains";
    default  "";
}

# This block adds headers unconditionally. EB's server block will inherit
# these add_header calls because they are defined at the http level.
# (add_header in a child block overrides parent — use 'always' to guarantee.)

# Injected via the proxy response path:
proxy_hide_header X-Powered-By;
add_header X-Content-Type-Options    "nosniff"                      always;
add_header X-Frame-Options           "DENY"                         always;
add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security $hsts_header                   always;
