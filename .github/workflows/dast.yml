name: DAST (ephemeral, in-CI)

# Stands up an ephemeral backend inside the runner (DynamoDB Local + stubbed
# integrations), runs an authenticated OWASP ZAP OpenAPI scan against it, then
# tears down. No standing infrastructure, no cloud secrets, fully reproducible
# for the audit (an A-LIGN reviewer can re-run this exact job).
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "openapi.yaml"
      - ".zap/**"
      - ".github/workflows/dast.yml"
  schedule:
    - cron: "0 8 * * 1" # weekly, Monday 08:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  dast:
    name: ZAP authenticated API scan (ephemeral)
    runs-on: ubuntu-latest
    services:
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports: ["8000:8000"]
    env:
      # APP_ENV is non-production, so every integration adapter resolves to its
      # safe stub/sandbox mode (no live Didit/FMCSA/Maps/Resend calls). The boot
      # guard is satisfied because nothing resolves to "live" outside production.
      APP_ENV: staging
      NODE_ENV: development
      # BETA_MODE defaults to true; turn it off so the seeded low-priv test user
      # is not blocked by the private-beta login gate.
      BETA_MODE: "off"
      PORT: "4000"
      DYNAMODB_ENDPOINT: http://127.0.0.1:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      FMCSA_MODE: stub
      MAPS_MODE: stub
      EMAIL_MODE: test
      PUSH_MODE: capture
      DIDIT_ENV: sandbox
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with: { node-version: "22" }

      - name: Generate ephemeral JWT secret
        run: echo "JWT_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Wait for DynamoDB Local, create tables, seed low-priv users
        working-directory: backend
        run: |
          for i in $(seq 1 30); do curl -s http://localhost:8000 >/dev/null && break; sleep 1; done
          node scripts/createTables.mjs
          node scripts/seedLocalUsers.mjs

      - name: Boot backend and wait for health
        working-directory: backend
        run: |
          node dist/index.js > /tmp/api.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:4000/api/health >/dev/null && { echo "backend up"; break; }
            sleep 2
          done
          curl -sf http://localhost:4000/api/health || { echo "backend did not boot"; cat /tmp/api.log; exit 1; }

      - name: Acquire JWT for a seeded low-privilege user
        id: jwt
        run: |
          set -euo pipefail
          curl -sf -c cj.txt -X POST http://localhost:4000/api/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"shipper1@test.com","password":"Password123!"}' -o /dev/null
          TOKEN=$(awk '/ll_token/ {print $7}' cj.txt)
          if [ -z "$TOKEN" ]; then echo "::error::login did not set ll_token"; cat /tmp/api.log; exit 1; fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: ZAP authenticated API scan (localhost target)
        id: zap
        run: |
          mkdir -p zap-out && chmod 777 zap-out
          # --network host lets the ZAP container reach the backend on the runner.
          # -I = do not fail on warnings; .zap/rules.tsv marks SQLi/RCE/SSRF as FAIL.
          set +e
          docker run --rm --network host -v "$PWD:/zap/wrk:rw" \
            -e ZAP_AUTH_HEADER=Authorization \
            -e ZAP_AUTH_HEADER_VALUE="Bearer ${{ steps.jwt.outputs.token }}" \
            -e ZAP_AUTH_HEADER_SITE=localhost:4000 \
            ghcr.io/zaproxy/zaproxy:stable zap-api-scan.py \
              -t openapi.yaml -f openapi -O http://localhost:4000 \
              -c .zap/rules.tsv -I \
              -J zap-out/report.json -r zap-out/report.html
          echo "exit=$?" >> "$GITHUB_OUTPUT"

      - name: Upload ZAP report (DAST evidence)
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: zap-dast-report
          path: zap-out/*
          if-no-files-found: warn

      - name: Fail on High-risk alerts
        run: |
          code="${{ steps.zap.outputs.exit }}"
          echo "zap-api-scan exit code: $code"
          # Non-zero means a FAIL-threshold (High) alert was found (warnings are ignored via -I).
          if [ "$code" != "0" ]; then
            echo "::error::ZAP DAST found High-risk findings. See the zap-dast-report artifact."
            exit 1
          fi
