name: DAST (authenticated, staging)

# Runs only after a successful staging backend deploy, never against production.
on:
  workflow_run:
    workflows: ["Deploy Backend"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  dast:
    name: ZAP authenticated API scan
    # Only when the upstream staging deploy succeeded on main, or manual dispatch.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    env:
      STAGING_API: https://staging-api.loadleadapp.com
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # 1) Acquire a JWT for a seeded, low-privilege carrier test user (no 2FA).
      #    Login sets the ll_token httpOnly cookie; read it from the cookie jar.
      #    The middleware also accepts Authorization: Bearer, which is what ZAP injects.
      - name: Acquire JWT for seeded test user
        id: jwt
        run: |
          set -euo pipefail
          curl -sf -c cookies.txt -X POST "$STAGING_API/api/auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"${{ secrets.DAST_TEST_EMAIL }}\",\"password\":\"${{ secrets.DAST_TEST_PASSWORD }}\"}" \
            -o /dev/null
          TOKEN=$(awk '/ll_token/ {print $7}' cookies.txt)
          if [ -z "$TOKEN" ]; then echo "::error::login did not return ll_token (2FA enabled, or bad creds, or staging down)"; exit 1; fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      # 2) Authenticated OpenAPI-driven active scan. ZAP attaches the bearer header
      #    to every request via the documented ZAP_AUTH_HEADER env vars. The action
      #    uploads the HTML/JSON/Markdown report as a run artifact (the DAST evidence),
      #    and fails the job on FAIL-threshold (High-risk) alerts per .zap/rules.tsv.
      - name: ZAP API scan (authenticated)
        uses: zaproxy/action-api-scan@bd24b11e76da11ab60302c8ae87f091cbb11f034 # v0.10.0
        with:
          target: openapi.yaml
          format: openapi
          cmd_options: "-O ${{ env.STAGING_API }}"
          rules_file_name: .zap/rules.tsv
          allow_issue_writing: false
          fail_action: true
        env:
          ZAP_AUTH_HEADER: Authorization
          ZAP_AUTH_HEADER_VALUE: "Bearer ${{ steps.jwt.outputs.token }}"
          ZAP_AUTH_HEADER_SITE: staging-api.loadleadapp.com
