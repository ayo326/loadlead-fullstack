name: SAST

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1" # weekly, Monday 07:00 UTC

# Least privilege: only what is needed to publish findings to code scanning.
permissions:
  contents: read
  security-events: write

concurrency:
  group: sast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep (multi-language)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with: { python-version: "3.12" }

      - name: Install Semgrep
        run: pip install --no-cache-dir semgrep==1.168.0

      # Full ruleset, all severities, SARIF for the Security tab. Does not fail here.
      - name: Semgrep scan (SARIF)
        run: |
          semgrep scan \
            --config p/typescript \
            --config p/react \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config p/secrets \
            --sarif --output semgrep.sarif \
            --metrics off \
            backend/src frontend-v2/src

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7e3036b9cd87fc26dd06747b7aa4b96c27aaef3a # codeql-action (refresh to latest v3 SHA before merge)
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      # Gate: fail only on ERROR-severity (HIGH) findings. Lower severities warn via the Security tab.
      - name: Gate on HIGH/ERROR
        run: |
          HIGH=$(jq '[.runs[].results[] | select(.level=="error")] | length' semgrep.sarif)
          echo "Semgrep ERROR-level findings: $HIGH"
          if [ "$HIGH" -gt 0 ]; then
            echo "::error::Semgrep found $HIGH HIGH/ERROR findings. Failing the build."
            exit 1
          fi

  njsscan:
    name: njsscan (Node/JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with: { python-version: "3.12" }

      - name: Install njsscan
        run: pip install --no-cache-dir njsscan==0.4.3

      - name: njsscan scan (SARIF)
        run: njsscan --sarif -o njsscan.sarif backend/src frontend-v2/src || true

      - name: Upload njsscan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7e3036b9cd87fc26dd06747b7aa4b96c27aaef3a # codeql-action (refresh to latest v3 SHA before merge)
        with:
          sarif_file: njsscan.sarif
          category: njsscan

      - name: Gate on HIGH/ERROR
        run: |
          HIGH=$(jq '[.runs[].results[] | select(.level=="error")] | length' njsscan.sarif)
          echo "njsscan ERROR-level findings: $HIGH"
          if [ "$HIGH" -gt 0 ]; then
            echo "::error::njsscan found $HIGH HIGH/ERROR findings. Failing the build."
            exit 1
          fi
