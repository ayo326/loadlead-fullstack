name: Deploy Backend

on:
  push:
    branches: [dev, main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {} # manual trigger - required for the prod job below

permissions:
  id-token: write   # required for OIDC -> AWS role assumption
  contents: read

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false # never cancel a half-finished EB deploy

jobs:
  # ── dev branch -> Dev environment, fully automatic ────────────────────────
  deploy-dev:
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      # H1 gate: refuse to deploy a non-prod env whose Terraform doesn't
      # override every DynamoDB table the backend reads - otherwise it would
      # silently read/write PRODUCTION tables. Fast, zero-dependency.
      - name: Verify non-prod table isolation (H1)
        run: node scripts/check-table-env-parity.mjs

      - name: Install & build
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Zip deploy bundle
        working-directory: backend
        run: zip -r ../deploy-dev.zip dist package.json package-lock.json .npmrc Procfile 2>/dev/null || zip -r ../deploy-dev.zip dist package.json package-lock.json .npmrc

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEV_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key:  ${{ env.AWS_ACCESS_KEY_ID }}
          aws_secret_key:  ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ env.AWS_SESSION_TOKEN }}
          application_name: LoadLead-Backend
          environment_name: loadlead-backend-dev
          version_label: dev-${{ github.sha }}-${{ github.run_number }}
          region: us-east-1
          deployment_package: deploy-dev.zip
          wait_for_deployment: true

  # ── main branch -> Staging environment, fully automatic ───────────────────
  deploy-staging:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    # The `secrets` context can't be used in a step `if:`. Surface it as a
    # job-level env var (job env CAN read secrets) so the pact steps below can
    # skip cleanly when the broker isn't configured.
    env:
      PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      # H1 gate: refuse to deploy a non-prod env whose Terraform doesn't
      # override every DynamoDB table the backend reads - otherwise it would
      # silently read/write PRODUCTION tables. Fast, zero-dependency.
      - name: Verify non-prod table isolation (H1)
        run: node scripts/check-table-env-parity.mjs

      # ─── Pact: publish this commit's verification, THEN gate ─────────────
      # verify-provider.yml also verifies+publishes on push to main, but it is
      # a SEPARATE workflow that races this job: can-i-deploy would query the
      # broker before the verification for this SHA lands, hitting the
      # non-retryable "No pacts or verifications have been published for
      # version <sha>" state (not an "unknown" that --retry-while-unknown
      # covers). Publishing here first makes the staging deploy self-contained
      # and removes the race. Both steps skip cleanly when the broker secret
      # is unset (workflows that ran before PactFlow was wired up).
      - name: Publish provider verification (this commit)
        if: ${{ env.PACT_BROKER_BASE_URL != '' }}
        working-directory: backend
        env:
          PACT_BROKER_URL:      ${{ secrets.PACT_BROKER_BASE_URL }}
          PACT_BROKER_TOKEN:    ${{ secrets.PACT_BROKER_TOKEN }}
          PACT_BROKER_PUBLISH_VERIFICATION_RESULTS: 'true'
          PROVIDER_VERSION:     ${{ github.sha }}
        run: |
          npm ci
          npx tsx tests/contract/verify-provider.ts

      - name: can-i-deploy (staging)
        if: ${{ env.PACT_BROKER_BASE_URL != '' }}
        run: |
          npm ci
          npx pact-broker can-i-deploy \
            --pacticipant loadlead-api \
            --version "${{ github.sha }}" \
            --to-environment staging \
            --retry-while-unknown 6 --retry-interval 10 \
            --broker-base-url="${{ secrets.PACT_BROKER_BASE_URL }}" \
            --broker-token="${{ secrets.PACT_BROKER_TOKEN }}"

      - name: Install & build
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Zip deploy bundle
        working-directory: backend
        run: zip -r ../deploy-staging.zip dist package.json package-lock.json .npmrc

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_STAGING_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key:  ${{ env.AWS_ACCESS_KEY_ID }}
          aws_secret_key:  ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ env.AWS_SESSION_TOKEN }}
          application_name: LoadLead-Backend
          environment_name: loadlead-backend-staging
          version_label: staging-${{ github.sha }}-${{ github.run_number }}
          region: us-east-1
          deployment_package: deploy-staging.zip
          wait_for_deployment: true

      - name: Smoke test
        # The API is fronted by its own CloudFront (api-staging), not the
        # frontend domain - the frontend distribution serves static files only
        # and does not proxy /api.
        run: |
          curl -sf https://api-staging.loadleadapp.com/api/health || (echo "Staging health check failed" && exit 1)

      # Security smoke (audit rec #4): an ADMIN with no enrolled MFA must be
      # refused at login. A real HTTP call catches what the mocked unit test
      # (M2) could rot on. Skips cleanly until the SMOKE_ADMIN_* secrets exist.
      - name: Security smoke - ADMIN login requires MFA
        env:
          SMOKE_BASE_URL: https://api-staging.loadleadapp.com
          SMOKE_ADMIN_NO_MFA_EMAIL: ${{ secrets.SMOKE_ADMIN_NO_MFA_EMAIL }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
        run: node scripts/smoke-admin-mfa.mjs

      # Tell the broker this provider version is now in staging so the
      # NEXT can-i-deploy --to-environment=production sees the correct
      # "currently deployed" reference. Skipped if broker not configured.
      - name: Record provider deployment (staging)
        if: ${{ env.PACT_BROKER_BASE_URL != '' }}
        run: |
          npx pact-broker record-deployment \
            --pacticipant loadlead-api \
            --version "${{ github.sha }}" \
            --environment staging \
            --broker-base-url="${{ secrets.PACT_BROKER_BASE_URL }}" \
            --broker-token="${{ secrets.PACT_BROKER_TOKEN }}"

  # ── Prod: manual trigger only, gated by the "production" GitHub Environment.
  #    The OIDC trust policy on AWS_PROD_DEPLOY_ROLE_ARN only allows
  #    assumption from a run *targeting* this Environment - so the required
  #    reviewers below are not just a GitHub-side checkbox, they're the only
  #    way the AWS credentials get issued at all. ──────────────────────────
  deploy-prod:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production # configure required reviewers on this Environment in repo settings
    # See deploy-staging: secrets aren't allowed in a step `if:`, so expose the
    # broker URL as job env for the pact gate's skip condition below.
    env:
      PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      # ─── Pact can-i-deploy gate ──────────────────────────────────────────
      # The cross-persona compatibility check. Blocks the prod deploy when
      # at least one persona consumer's contract isn't satisfied by this
      # provider version. Names the broken consumer in the output so the
      # operator approving the prod workflow_dispatch can see which
      # persona's pact failed.
      - name: can-i-deploy (production)
        if: ${{ env.PACT_BROKER_BASE_URL != '' }}
        run: |
          npm ci
          npx pact-broker can-i-deploy \
            --pacticipant loadlead-api \
            --version "${{ github.sha }}" \
            --to-environment production \
            --retry-while-unknown 6 --retry-interval 10 \
            --broker-base-url="${{ secrets.PACT_BROKER_BASE_URL }}" \
            --broker-token="${{ secrets.PACT_BROKER_TOKEN }}"

      - name: Install & build
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Zip deploy bundle
        working-directory: backend
        run: zip -r ../deploy-prod.zip dist package.json package-lock.json .npmrc

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PROD_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key:  ${{ env.AWS_ACCESS_KEY_ID }}
          aws_secret_key:  ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ env.AWS_SESSION_TOKEN }}
          application_name: LoadLead-Backend
          environment_name: loadlead-backend-prod
          version_label: prod-${{ github.sha }}-${{ github.run_number }}
          region: us-east-1
          deployment_package: deploy-prod.zip
          wait_for_deployment: true

      # Tell the broker this provider version is now in production so the
      # NEXT can-i-deploy sees the correct "currently deployed" reference.
      - name: Record provider deployment (production)
        if: ${{ env.PACT_BROKER_BASE_URL != '' }}
        run: |
          npx pact-broker record-deployment \
            --pacticipant loadlead-api \
            --version "${{ github.sha }}" \
            --environment production \
            --broker-base-url="${{ secrets.PACT_BROKER_BASE_URL }}" \
            --broker-token="${{ secrets.PACT_BROKER_TOKEN }}"

      - name: Smoke test
        run: |
          curl -sf https://api.loadleadapp.com/api/health || (echo "Prod health check failed" && exit 1)
