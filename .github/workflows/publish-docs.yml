# Docs sanity checks for /docs/**.
#
# Publishing to Confluence is done LOCALLY via `make publish-docs` (or
# `bash scripts/publish-docs.sh`). It cannot run from GitHub-hosted runners:
# Atlassian Free-tier Confluence quietly returns 404 HTML to datacenter IPs
# for the v1 REST endpoints the publisher uses, even with valid auth — the
# same call from a residential IP returns 200. Until the site is on a paid
# tier (or a self-hosted runner is added), CI only validates front-matter
# and asks contributors to publish locally after merge.
#
# Triggered on:
#   - PRs touching docs/** → front-matter check (warn on missing).
#   - Pushes to main touching docs/** → reminder comment in the job summary
#     so whoever merged remembers to run the local publish.

name: Docs sanity checks

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/publish-docs.sh'
      - 'scripts/render-confluence-config.sh'
      - '.github/workflows/publish-docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/publish-docs.sh'
      - 'scripts/render-confluence-config.sh'
      - '.github/workflows/publish-docs.yml'

permissions:
  contents: read

jobs:
  validate:
    name: validate docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Front-matter sanity check
        run: |
          missing=0
          for f in $(find docs -name '*.md'); do
            if ! head -1 "$f" | grep -q '^---$'; then
              echo "::warning file=$f::missing front-matter (connie-title / connie-publish)"
              missing=$((missing+1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::warning::${missing} file(s) missing front-matter — they will be skipped by the publisher"
          else
            echo "✓ all docs have front-matter"
          fi

      - name: Post-merge publish reminder
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          {
            echo "## 📘 Reminder: run \`make publish-docs\` locally"
            echo ""
            echo "Docs under \`/docs/**\` changed on \`main\`. Atlassian's Free-tier"
            echo "Confluence blocks GitHub-runner IPs, so the publish step has to"
            echo "run from a residential machine."
            echo ""
            echo "On the machine that holds your Confluence credentials:"
            echo ""
            echo '```bash'
            echo "git pull origin main"
            echo "make publish-docs"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
