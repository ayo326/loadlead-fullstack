    user_story:
      as_a: "platform engineer"
      i_want: "a real pausable staging that costs ~$0 at rest, with a one-click start/pause control"
      so_that: "we validate every change on a prod-parity environment before prod, without a standing bill"
    gherkin: |
      Given the staging EB env is paused
      When an engineer clicks "Start staging env" (with the shared secret)
      Then the Lambda scales the ASG to 1 and api-staging returns {"ok":true}, and the env can be paused back to 0 instances ($0)
