  # ── EPIC: Analytics DB — Tier 1 (Geospatial, build-now) ────────────────
  - { ext_id: analytics:tier1, parent_ext_id: epic:analytics-db, type: Story, title: "Tier 1 — Geospatial (PostGIS + DynamoDB Streams, build-now)", status_source: manifest, status: "To Do", labels: [analytics, tier1, infra] }
  - ext_id: analytics:rds
    parent_ext_id: analytics:tier1
    type: Sub-task
    title: "Provision RDS PostgreSQL 16 with PostGIS (db.t4g.small, gp3 50GB, private VPC)"
    status_source: manifest
    status: "To Do"
    labels: [analytics, rds]
    priority_hint: High
    context: |
      Stand up the Postgres 16 RDS instance that will host the analytics replica.
      Same VPC as loadlead-backend-prod, private subnets, no public access.
      Build-now sizing is db.t4g.small (~$25/mo) — upgrade later if the MV
      refresh hits CPU limits.
    user_story:
      as_a: platform engineer
      i_want: an RDS instance in the EB VPC with PostGIS available
      so_that: the stream consumer Lambda can write read models and MVs can be queried by the backend
    gherkin: |
      Scenario: RDS PostGIS instance is up
        Given the AWS Console RDS wizard completed with the build-now config
        When the DB status reaches "Available"
        Then `psql` against the endpoint succeeds with the master credentials
        And `SELECT postgis_full_version();` returns a version string
  - ext_id: analytics:secret
    parent_ext_id: analytics:tier1
    type: Sub-task
    title: "Store ANALYTICS_DATABASE_URL in Secrets Manager (loadlead/analytics/db)"
    status_source: manifest
    status: "To Do"
    labels: [analytics, secrets]
    priority_hint: High
    context: |
      Per spec §6 + STIG LL-IA-002: the connection string is a secret. It lives
      in AWS Secrets Manager (KMS-encrypted), never in `.env` or repo files.
      The stream consumer Lambda's IAM role reads it via secretsmanager:GetSecretValue
      scoped to this exact secret ARN.
    user_story:
      as_a: security engineer
      i_want: the DB URL stored in Secrets Manager
      so_that: no application code or env file ever holds the credential, and rotation can happen without redeploy
    gherkin: |
      Scenario: Analytics DB URL is in Secrets Manager
        Given the RDS instance is Available with the master password issued
        When the secret loadlead/analytics/db is created with key ANALYTICS_DATABASE_URL
        Then `aws secretsmanager get-secret-value --secret-id loadlead/analytics/db` returns the URL
        And no committed file in the repo contains the password
  - ext_id: analytics:vpc
    parent_ext_id: analytics:tier1
    type: Sub-task
    title: "VPC + security-group rules — port 5432 from EB SG and Lambda SG"
    status_source: manifest
    status: "To Do"
    labels: [analytics, vpc, networking]
    priority_hint: High
    context: |
      The stream consumer Lambda and the EB backend both need to reach the RDS
      instance on TCP 5432. The RDS security group only allows traffic from
      explicitly-trusted SGs. No 0.0.0.0/0.
    user_story:
      as_a: platform engineer
      i_want: tight SG rules allowing only EB + Lambda → RDS:5432
      so_that: the analytics replica isn't reachable from anywhere else, including the public internet
    gherkin: |
      Scenario: SG inbound rules are restrictive
        Given loadlead-analytics-rds-sg exists
        When the inbound rules are inspected
        Then exactly two rules exist (EB SG and Lambda SG), both on TCP 5432
        And no 0.0.0.0/0 or wide source CIDR is present
  - ext_id: analytics:iam
    parent_ext_id: analytics:tier1
    type: Sub-task
    title: "IAM role for stream consumer Lambda (read-only DynamoDB + Secrets read)"
    status_source: manifest
    status: "To Do"
    labels: [analytics, iam, security]
    priority_hint: High
    context: |
      The Lambda function reads DynamoDB Streams and writes to RDS. It must NOT
      have any write permission on DynamoDB itself — DynamoDB is read-only from
      the analytics replica's perspective (spec §6, LL-AC-001). Role uses managed
      policies for VPC + logs plus a tight inline policy for streams + secret.
    user_story:
      as_a: security engineer
      i_want: a Lambda execution role with read-only DynamoDB stream access and a single secret read
      so_that: a compromised Lambda cannot tamper with the source-of-truth DynamoDB data
    gherkin: |
      Scenario: Lambda role is read-only on DynamoDB
        Given the IAM role loadlead-analytics-stream-consumer-role
        When its attached policies are inspected
        Then the inline policy includes ONLY DescribeStream/GetRecords/GetShardIterator/ListStreams + GetSecretValue
        And no PutItem, UpdateItem, DeleteItem, or wildcard dynamodb:* action is present
  - ext_id: analytics:streams
    parent_ext_id: analytics:tier1
    type: Sub-task
    title: "Enable DynamoDB Streams on 8 source tables (NEW_AND_OLD_IMAGES)"
    status_source: manifest
    status: "To Do"
    labels: [analytics, dynamodb, streams]
    priority_hint: High
    context: |
      Tables: LoadLead_Loads, _Offers, _Drivers, _OwnerOperators, _Organizations,
      _Memberships, _Verifications, _FactoringOptIns. Image type must be
      NEW_AND_OLD_IMAGES so the consumer can compute deltas. Output: the 8 stream
      ARNs attached to this ticket — I'll wire each as a Lambda trigger.
