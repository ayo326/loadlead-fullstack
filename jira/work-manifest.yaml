  - { ext_id: refactor:types,        parent_ext_id: epic:carrier-refactor, type: Story, title: "Types & enums for VerificationEntityType, CarrierOfRecord, idvStatus, isSelf", status_source: git, git_marker: "carrier-of-record refactor", labels: [refactor, types] }
  - { ext_id: refactor:carrier-of-record, parent_ext_id: epic:carrier-refactor, type: Story, title: "services/carrierOfRecord.ts — resolve(driver) precedence + isCarrierVerified gate", status_source: git, git_marker: "carrier-of-record refactor", labels: [refactor], links: [test:A1, test:A2, test:A3, test:A4, test:A5, test:A6, test:A7, test:A8] }
  - { ext_id: refactor:gates,        parent_ext_id: epic:carrier-refactor, type: Story, title: "requireVerifiedCarrier two-gate (authority + per-person idvStatus)", status_source: git, git_marker: "carrier-of-record refactor", labels: [refactor], links: [test:B1, test:B2, test:B3, test:B4, test:B5, test:B6, test:B7, test:B8, test:B9, test:B10, test:B11] }
