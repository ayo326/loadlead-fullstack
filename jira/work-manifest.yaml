      i_want: active MC broker authority and the surety bond posted
      so_that: LoadLead can lawfully arrange transportation and collect broker fees
    gherkin: |
      Scenario: Brokers authority is live
        Given the OP-1 broker application is filed and FMCSA fee paid
        And the BMC-84 bond + BOC-3 process agent are filed by the surety/agent
        When FMCSA's 21-day protest window passes
        Then the MC number's "broker authority" is shown as ACTIVE on SAFER
        And UCR registration for the current calendar year is on file
