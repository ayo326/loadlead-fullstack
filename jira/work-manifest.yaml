  - { ext_id: refactor:self-driver,  parent_ext_id: epic:carrier-refactor, type: Story, title: "OO self-driver auto-creation + lazy backfill (idempotent)", status_source: git, git_marker: "carrier-of-record refactor", labels: [refactor], links: [test:D1, test:D2, test:D6] }
